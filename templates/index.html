<!DOCTYPE html>
<html>
<head>
    <title>Academy Generator</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            max-width:1000px;
            margin:auto;
            padding:20px;
        }

        button{
            padding:10px;
            font-size:16px;
        }

    </style>
</head>

<body>

<h1>Academy Quiz Generator</h1>

<form method="POST">

    </label>
    <br>

    <label>
        <input type="checkbox" name="subunits" value="1B">
        B
    </label>
    <br>

    <label>
        <input type="checkbox" name="subunits" value="1C">
        C
    </label>
    <br>

    <label>
        <input type="checkbox" name="subunits" value="1D">
        D
    </label>
    <br>

    <label>
        <input type="checkbox" name="subunits" value="1FINAL">
        FINAL
    </label>

    <br><br>

    <button type="submit">
        Generate Selected
    </button>

</form>

</body>
</html>
