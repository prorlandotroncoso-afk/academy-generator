<!DOCTYPE html>

<html>
<head>
    <title>Academy Generator</title>

```
<style>

    body{
        font-family: Arial, sans-serif;
        max-width:1000px;
        margin:auto;
        padding:20px;
    }

    select,button{
        padding:10px;
        font-size:16px;
        margin-right:10px;
    }

    pre{
        background:#f5f5f5;
        padding:20px;
        white-space:pre-wrap;
        border-radius:8px;
    }

    #saveResult{
        margin-top:15px;
        font-weight:bold;
    }

</style>
```

</head>

<body>

<h1>Academy Quiz Generator</h1>

<form method="POST">

```
<h2>Select Unit</h2>

<select name="unit">

    <option value="1">UNIT 1</option>
    <option value="2">UNIT 2</option>
    <option value="3">UNIT 3</option>
    <option value="4">UNIT 4</option>
    <option value="5">UNIT 5</option>
    <option value="6">UNIT 6</option>
    <option value="7">UNIT 7</option>
    <option value="8">UNIT 8</option>
    <option value="9">UNIT 9</option>
    <option value="10">UNIT 10</option>

</select>

<h2>Select Subunits</h2>

<label>
    <input type="checkbox" name="subunits" value="A">
    A
</label>
<br>

<label>
    <input type="checkbox" name="subunits" value="B">
    B
</label>
<br>

<label>
    <input type="checkbox" name="subunits" value="C">
    C
</label>
<br>

<label>
    <input type="checkbox" name="subunits" value="D">
    D
</label>
<br>

<label>
    <input type="checkbox" name="subunits" value="FINAL">
    FINAL
</label>

<br><br>

<button type="submit">
    Generate Selected
</button>
```

</form>

{% if result %}

<hr>

<h2>Generated Quiz</h2>

<pre id="quizContent">{{ result }}</pre>

<button id="saveQuizBtn">
    Save Quiz To Queue
</button>

<div id="saveResult"></div>

<script>

document
.getElementById("saveQuizBtn")
.addEventListener("click", async () => {

    const quizText =
        document.getElementById("quizContent").innerText;

    const response = await fetch(
        "/save_quiz",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                title: "Generated Quiz",
                content: quizText
            })
        }
    );

    const data = await response.json();

    document.getElementById("saveResult").innerHTML =
        "✅ Quiz guardado. Pendientes: " + data.pending;

});

</script>

{% endif %}

</body>
</html>
